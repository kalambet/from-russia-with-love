---
# Fetch current credentials from running nodes
# Usage: ansible-playbook playbooks/credentials.yml -e target_service=mtg
- name: Fetch credentials
  hosts: "{{ target_service }}"
  gather_facts: true
  become: true

  vars:
    target_service: ""

  pre_tasks:
    - name: Validate target_service
      ansible.builtin.assert:
        that:
          - target_service in ['mtg', 'outline']
        fail_msg: "target_service must be 'mtg' or 'outline'"
      delegate_to: localhost
      run_once: true

    - name: Ensure credentials output directory exists
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}"
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: Derive service label from inventory hostname
      ansible.builtin.set_fact:
        service_label: "{{ inventory_hostname }}"

  tasks:
    # --- mtg credentials ---
    - name: Get mtg proxy link
      ansible.builtin.command:
        cmd: "docker exec mtg /mtg access /config.toml"
      register: mtg_link
      when: target_service == "mtg"
      changed_when: false

    - name: Save mtg credentials
      ansible.builtin.copy:
        content: |
          # MTProxy (mtg) Credentials
          # Fetched: {{ ansible_date_time.iso8601 }}
          # Server: {{ ansible_host }}
          # Port: {{ mtg_port }}

          Proxy link (share this with Telegram users):
          {{ mtg_link.stdout | regex_replace('%3A', ':') | regex_replace('%253A', ':') }}
        dest: "{{ credentials_output_dir }}/{{ service_label }}_credentials.txt"
        mode: '0600'
      delegate_to: localhost
      become: false
      when: target_service == "mtg"

    # --- Outline credentials ---
    - name: Read Outline access config
      ansible.builtin.slurp:
        src: /opt/outline/access.txt
      register: outline_access
      when: target_service == "outline"

    - name: Parse Outline API URL
      ansible.builtin.set_fact:
        outline_api_url: "{{ (outline_access.content | b64decode).split('\n') | select('match', 'apiUrl:') | first | regex_replace('apiUrl:', '') }}"
        outline_cert_sha256: "{{ (outline_access.content | b64decode).split('\n') | select('match', 'certSha256:') | first | regex_replace('certSha256:', '') }}"
      when: target_service == "outline"

    - name: List Outline access keys
      ansible.builtin.uri:
        url: "{{ outline_api_url }}/access-keys"
        method: GET
        validate_certs: false
      register: outline_keys
      when: target_service == "outline"

    - name: Save Outline credentials
      ansible.builtin.copy:
        content: |
          # Outline VPN Credentials
          # Fetched: {{ ansible_date_time.iso8601 }}
          # Server: {{ ansible_host }}

          Access Keys (share with Outline client app):
          {% for key in outline_keys.json.accessKeys %}
          {{ key.name | default('Key ' + key.id | string) }}: {{ key.accessUrl }}
          {% endfor %}

          Management JSON (use in Outline Manager app):
          {"apiUrl":"{{ outline_api_url }}","certSha256":"{{ outline_cert_sha256 }}"}
        dest: "{{ credentials_output_dir }}/{{ service_label }}_credentials.txt"
        mode: '0600'
      delegate_to: localhost
      become: false
      when: target_service == "outline"

    - name: Display credentials location
      ansible.builtin.debug:
        msg: "Credentials saved to {{ credentials_output_dir }}/{{ service_label }}_credentials.txt"
