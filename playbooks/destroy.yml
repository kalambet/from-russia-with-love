---
# Destroy a VPS for a target service
# Usage: ansible-playbook playbooks/destroy.yml -e target_service=mtg -e provider=vultr
# If provider is omitted, reads from credentials/<service>_provider.txt (saved during provision)
- name: Destroy VPS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    target_service: ""  # Required: mtg or outline
    provider: ""        # Optional: auto-detected from saved state

  pre_tasks:
    - name: Validate target_service
      ansible.builtin.assert:
        that:
          - target_service in ['mtg', 'outline']
        fail_msg: "target_service must be 'mtg' or 'outline'"

    - name: Load service variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/{{ target_service }}.yml"

    - name: Load shared variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/all.yml"

    - name: Auto-detect provider from saved state
      ansible.builtin.set_fact:
        provider: "{{ lookup('file', credentials_output_dir + '/' + target_service + '_provider.txt') }}"
      when: provider == ""
      ignore_errors: true

    - name: Validate provider
      ansible.builtin.assert:
        that:
          - provider in ['vultr', 'linode']
        fail_msg: "provider must be 'vultr' or 'linode'. Pass -e provider=vultr or ensure credentials/{{ target_service }}_provider.txt exists"

    - name: Load provider variables
      ansible.builtin.include_vars:
        file: "../providers/{{ provider }}.yml"

    - name: Set service label
      ansible.builtin.set_fact:
        service_label: "{{ mtg_label | default('mtg-proxy') if target_service == 'mtg' else outline_label | default('outline-vpn') }}"

  tasks:
    - name: "Destroy on {{ provider }}"
      ansible.builtin.include_role:
        name: "provider_{{ provider }}"
        tasks_from: destroy.yml

    - name: Remove old credentials file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ target_service }}_credentials.txt"
        state: absent

    - name: Remove old provider file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ target_service }}_provider.txt"
        state: absent

    - name: Display destruction complete
      ansible.builtin.debug:
        msg: "Destroyed {{ service_label }} on {{ provider }}"
