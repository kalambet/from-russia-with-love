---
# Destroy a VPS for a target service
# Usage: ansible-playbook playbooks/destroy.yml -e target_service=mtg -e provider=vultr
# If provider is omitted, reads from credentials/<service>_provider.txt (saved during provision)
- name: Destroy VPS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    target_service: ""  # Required: mtg or outline
    provider: ""        # Optional: auto-detected from saved state

  pre_tasks:
    - name: Validate target_service
      ansible.builtin.assert:
        that:
          - target_service in ['mtg', 'outline']
        fail_msg: "target_service must be 'mtg' or 'outline'"

    - name: Load service variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/{{ target_service }}.yml"

    - name: Load shared variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/all.yml"

    - name: Validate provider
      ansible.builtin.assert:
        that:
          - provider in ['vultr', 'linode', 'upcloud', 'gcp']
        fail_msg: "provider is required. Pass -e provider=vultr (or linode, upcloud, gcp)"

    - name: Load provider variables
      ansible.builtin.include_vars:
        file: "../providers/{{ provider }}.yml"

    - name: Set service label
      ansible.builtin.set_fact:
        service_label: "{{ target_service }}-{{ provider }}"

    - name: Load saved deploy region
      ansible.builtin.set_fact:
        deploy_region: "{{ lookup('file', credentials_output_dir + '/' + service_label + '_region.txt') }}"
      ignore_errors: true

    - name: Fall back to provider default region
      ansible.builtin.set_fact:
        deploy_region: "{{ provider_region }}"
      when: deploy_region is not defined or deploy_region == ""

  tasks:
    - name: "Destroy on {{ provider }}"
      ansible.builtin.include_role:
        name: "provider_{{ provider }}"
        tasks_from: destroy.yml

    - name: Remove old credentials file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ service_label }}_credentials.txt"
        state: absent

    - name: Remove old provider file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ service_label }}_provider.txt"
        state: absent

    - name: Remove old host IP file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ service_label }}_host_ip.txt"
        state: absent

    - name: Remove old region file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ service_label }}_region.txt"
        state: absent

    - name: Remove old API port file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ service_label }}_api_port.txt"
        state: absent

    - name: Remove old access port file
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}/{{ service_label }}_access_port.txt"
        state: absent

    - name: Display destruction complete
      ansible.builtin.debug:
        msg: "Destroyed {{ service_label }} on {{ provider }}"
