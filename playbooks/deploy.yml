---
# Deploy service to a provisioned VPS
# Hosts are discovered via dynamic inventory (tagged with service name)
# Usage: ansible-playbook playbooks/deploy.yml -e target_service=mtg
- name: "Deploy {{ target_service | default('service') }}"
  hosts: "{{ target_host | default(target_service) }}"
  gather_facts: false
  become: true

  vars:
    target_service: ""  # Required: mtg or outline

  vars_files:
    - "../inventory/group_vars/all.yml"
    - "../inventory/group_vars/{{ target_service }}.yml"

  pre_tasks:
    - name: Validate target_service
      ansible.builtin.assert:
        that:
          - target_service in ['mtg', 'outline']
        fail_msg: "target_service must be 'mtg' or 'outline'"

    - name: Set service label
      ansible.builtin.set_fact:
        service_label: "{{ target_service }}-{{ provider }}"
      when: provider is defined and provider != ""

    - name: Derive service label from inventory hostname
      ansible.builtin.set_fact:
        service_label: "{{ inventory_hostname }}"
      when: provider is not defined or provider == ""

    - name: Check saved Outline API port file
      ansible.builtin.stat:
        path: "{{ credentials_output_dir }}/{{ service_label }}_api_port.txt"
      register: outline_api_port_file
      when: target_service == 'outline'
      delegate_to: 127.0.0.1
      connection: local
      become: false

    - name: Check saved Outline access port file
      ansible.builtin.stat:
        path: "{{ credentials_output_dir }}/{{ service_label }}_access_port.txt"
      register: outline_access_port_file
      when: target_service == 'outline'
      delegate_to: 127.0.0.1
      connection: local
      become: false

    - name: Fail if saved Outline port files are missing
      ansible.builtin.fail:
        msg: >-
          Outline port files not found for {{ service_label }} in {{ credentials_output_dir }}.
          Run provision.yml first to generate ports, or check that service_label matches.
      when:
        - target_service == 'outline'
        - not (outline_api_port_file.stat.exists | default(false)) or not (outline_access_port_file.stat.exists | default(false))

    - name: Load saved Outline API port
      ansible.builtin.set_fact:
        outline_api_port: "{{ lookup('file', credentials_output_dir + '/' + service_label + '_api_port.txt') }}"
      when: target_service == 'outline'

    - name: Load saved Outline access port
      ansible.builtin.set_fact:
        outline_access_port: "{{ lookup('file', credentials_output_dir + '/' + service_label + '_access_port.txt') }}"
      when: target_service == 'outline'

    - name: Set service ports for firewall
      ansible.builtin.set_fact:
        service_ports: "{{ [mtg_port] if target_service == 'mtg' else [outline_access_port, outline_api_port] }}"

    - name: Ensure credentials output directory exists
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}"
        state: directory
        mode: '0700'
      delegate_to: 127.0.0.1
      connection: local
      become: false
      run_once: true

  roles:
    - role: common
    - role: "{{ target_service }}"
