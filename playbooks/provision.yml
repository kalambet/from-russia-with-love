---
# Provision a VPS for a target service on a given provider
# Usage: ansible-playbook playbooks/provision.yml -e target_service=mtg -e provider=vultr
# Optional: -e region=fra (override provider's default region)
- name: Provision VPS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    target_service: ""  # Required: mtg or outline
    provider: ""        # Required: vultr or linode
    region: ""          # Optional: override provider default region

  pre_tasks:
    - name: Validate target_service
      ansible.builtin.assert:
        that:
          - target_service in ['mtg', 'outline']
        fail_msg: "target_service must be 'mtg' or 'outline'"

    - name: Validate provider
      ansible.builtin.assert:
        that:
          - provider in ['vultr', 'linode', 'upcloud']
        fail_msg: "provider must be 'vultr', 'linode', or 'upcloud'"

    - name: Load service variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/{{ target_service }}.yml"

    - name: Load shared variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/all.yml"

    - name: Load provider variables
      ansible.builtin.include_vars:
        file: "../providers/{{ provider }}.yml"

    - name: Set deployment facts
      ansible.builtin.set_fact:
        deploy_region: "{{ region if region != '' else provider_region }}"
        service_label: "{{ target_service }}-{{ provider }}"

    - name: Validate SSH key 1Password path is configured
      ansible.builtin.assert:
        that:
          - op_ssh_key_item != ""
        fail_msg: "op_ssh_key_item must be set in inventory/group_vars/all.yml (e.g. 'op://Infrastructure/SSH Key/public key')"

    - name: Read SSH public key from 1Password
      ansible.builtin.command:
        argv:
          - op
          - read
          - "{{ op_ssh_key_item }}"
      register: ssh_key_result
      no_log: false
      changed_when: false

    - name: Set SSH public key
      ansible.builtin.set_fact:
        ssh_public_key_content: "{{ ssh_key_result.stdout | trim }}"
      no_log: false

  tasks:
    - name: "Provision on {{ provider }}"
      ansible.builtin.include_role:
        name: "provider_{{ provider }}"

    - name: Remove old SSH host key if present
      ansible.builtin.known_hosts:
        name: "{{ new_host_ip }}"
        state: absent
      ignore_errors: true

    - name: Display provisioned host
      ansible.builtin.debug:
        msg: "Provisioned {{ target_service }} on {{ provider }} ({{ deploy_region }}) at {{ new_host_ip }}"

    - name: Save provider for destroy/redeploy
      ansible.builtin.copy:
        content: "{{ provider }}"
        dest: "{{ credentials_output_dir }}/{{ target_service }}_provider.txt"
        mode: '0600'
      delegate_to: localhost

    - name: Add new host to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ new_host_ip }}"
        groups:
          - "{{ target_service }}"
        ansible_user: root

