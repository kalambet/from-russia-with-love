---
# Provision a VPS for a target service on a given provider
# Usage: ansible-playbook playbooks/provision.yml -e target_service=mtg -e provider=vultr
# Optional: -e region=fra (override provider's default region)
- name: Provision VPS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    target_service: ""  # Required: mtg or outline
    provider: ""        # Required: vultr or linode
    region: ""          # Optional: override provider default region

  pre_tasks:
    - name: Validate target_service
      ansible.builtin.assert:
        that:
          - target_service in ['mtg', 'outline']
        fail_msg: "target_service must be 'mtg' or 'outline'"

    - name: Validate provider
      ansible.builtin.assert:
        that:
          - provider in ['vultr', 'linode', 'upcloud', 'gcp']
        fail_msg: "provider must be 'vultr', 'linode', 'upcloud', or 'gcp'"

    - name: Load service variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/{{ target_service }}.yml"

    - name: Load shared variables
      ansible.builtin.include_vars:
        file: "../inventory/group_vars/all.yml"

    - name: Load provider variables
      ansible.builtin.include_vars:
        file: "../providers/{{ provider }}.yml"

    - name: Set deployment facts
      ansible.builtin.set_fact:
        deploy_region: "{{ region if region != '' else provider_region }}"
        service_label: "{{ target_service }}-{{ provider }}"

    - name: Ensure credentials output directory exists
      ansible.builtin.file:
        path: "{{ credentials_output_dir }}"
        state: directory
        mode: '0700'

    - name: Check for existing Outline API port file
      ansible.builtin.stat:
        path: "{{ credentials_output_dir }}/{{ service_label }}_api_port.txt"
      register: existing_api_port_file
      when: target_service == 'outline'

    - name: Check for existing Outline access port file
      ansible.builtin.stat:
        path: "{{ credentials_output_dir }}/{{ service_label }}_access_port.txt"
      register: existing_access_port_file
      when: target_service == 'outline'

    - name: Load existing Outline API port
      ansible.builtin.set_fact:
        outline_api_port: "{{ lookup('file', credentials_output_dir + '/' + service_label + '_api_port.txt') }}"
      when: target_service == 'outline' and (existing_api_port_file.stat.exists | default(false))

    - name: Load existing Outline access port
      ansible.builtin.set_fact:
        outline_access_port: "{{ lookup('file', credentials_output_dir + '/' + service_label + '_access_port.txt') }}"
      when: target_service == 'outline' and (existing_access_port_file.stat.exists | default(false))

    - name: Generate random Outline API port
      ansible.builtin.set_fact:
        outline_api_port: "{{ range(1024, 65536) | random }}"
      when: target_service == 'outline' and not (existing_api_port_file.stat.exists | default(false))

    - name: Generate random Outline access port (guaranteed different from API port)
      ansible.builtin.set_fact:
        outline_access_port: "{{ (range(1024, 65536) | reject('equalto', outline_api_port | int) | list) | random }}"
      when: target_service == 'outline' and not (existing_access_port_file.stat.exists | default(false))

    - name: Save Outline API port
      ansible.builtin.copy:
        content: "{{ outline_api_port }}"
        dest: "{{ credentials_output_dir }}/{{ service_label }}_api_port.txt"
        mode: '0600'
      when: target_service == 'outline'

    - name: Save Outline access port
      ansible.builtin.copy:
        content: "{{ outline_access_port }}"
        dest: "{{ credentials_output_dir }}/{{ service_label }}_access_port.txt"
        mode: '0600'
      when: target_service == 'outline'

    - name: Set SSH key 1Password path (provider-specific or default)
      ansible.builtin.set_fact:
        effective_ssh_key_item: "{{ provider_ssh_key_item | default(op_ssh_key_item) }}"

    - name: Validate SSH key 1Password path is configured
      ansible.builtin.assert:
        that:
          - effective_ssh_key_item != ""
        fail_msg: "No SSH key configured. Set provider_ssh_key_item in providers/<provider>.yml or op_ssh_key_item in group_vars/all.yml"

    - name: Read SSH public key from 1Password
      ansible.builtin.command:
        argv:
          - op
          - read
          - "{{ effective_ssh_key_item }}"
      register: ssh_key_result
      no_log: false
      changed_when: false

    - name: Set SSH public key
      ansible.builtin.set_fact:
        ssh_public_key_content: "{{ ssh_key_result.stdout | trim | regex_replace('\\s+$', '') }}"
      no_log: false

  tasks:
    - name: "Provision on {{ provider }}"
      ansible.builtin.include_role:
        name: "provider_{{ provider }}"

    - name: Remove old SSH host key if present
      ansible.builtin.known_hosts:
        name: "{{ new_host_ip }}"
        state: absent
      ignore_errors: true

    - name: Display provisioned host
      ansible.builtin.debug:
        msg: "Provisioned {{ target_service }} on {{ provider }} ({{ deploy_region }}) at {{ new_host_ip }}"

    - name: Save provider for destroy/redeploy
      ansible.builtin.copy:
        content: "{{ provider }}"
        dest: "{{ credentials_output_dir }}/{{ service_label }}_provider.txt"
        mode: '0600'
      delegate_to: localhost

    - name: Save host IP for targeted deploy
      ansible.builtin.copy:
        content: "{{ new_host_ip }}"
        dest: "{{ credentials_output_dir }}/{{ service_label }}_host_ip.txt"
        mode: '0600'
      delegate_to: localhost

    - name: Save deploy region for destroy
      ansible.builtin.copy:
        content: "{{ deploy_region }}"
        dest: "{{ credentials_output_dir }}/{{ service_label }}_region.txt"
        mode: '0600'
      delegate_to: localhost

    - name: Add new host to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ new_host_ip }}"
        groups:
          - "{{ target_service }}"
        ansible_user: root

