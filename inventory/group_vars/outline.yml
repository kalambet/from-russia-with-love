---
# Outline VPN service config — provider-agnostic
# Ports are randomly generated per deployment (matching official Outline install approach).
# Saved to credentials/<service_label>_api_port.txt and _access_port.txt during provisioning.
outline_label: "outline-vpn"

# Access key recipients — one key per name, shown in Outline Manager
outline_key_names:
  - "mom"
  - "dad"
  - "sister"
