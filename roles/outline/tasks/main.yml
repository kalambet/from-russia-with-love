---
- name: Create Outline install directory
  ansible.builtin.file:
    path: /opt/outline
    state: directory
    mode: '0700'

- name: Download Outline install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/Jigsaw-Code/outline-server/master/src/server_manager/install_scripts/install_server.sh
    dest: /opt/outline/install_server.sh
    mode: '0755'

- name: Check if Outline is already installed
  ansible.builtin.command: docker ps --filter name=shadowbox --format '{{ '{{' }}.Names{{ '}}' }}'
  register: outline_check
  changed_when: false

- name: Run Outline install script
  ansible.builtin.command:
    argv:
      - bash
      - /opt/outline/install_server.sh
      - --hostname
      - "{{ ansible_host }}"
      - --keys-port
      - "{{ outline_access_port }}"
  register: outline_install_result
  when: outline_check.stdout == ""
  changed_when: true
  no_log: false
  environment:
    SB_API_PORT: "{{ outline_api_port }}"

- name: Read Outline access config
  ansible.builtin.slurp:
    src: /opt/outline/access.txt
  register: outline_access_file

- name: Parse Outline access config
  ansible.builtin.set_fact:
    outline_api_url: "{{ (outline_access_file.content | b64decode).split('\n') | select('match', 'apiUrl:') | first | regex_replace('^apiUrl:', '') }}"
    outline_cert_sha256: "{{ (outline_access_file.content | b64decode).split('\n') | select('match', 'certSha256:') | first | regex_replace('^certSha256:', '') }}"

# NOTE: The Outline management API port is exposed externally. Docker bypasses UFW,
# so iptables rules would be needed to restrict it to localhost. The API requires
# the cert SHA256 for authentication, which provides some protection. Consider
# adding iptables DOCKER-USER chain rules in production to restrict API port access.

- name: Wait for Outline API to be ready
  ansible.builtin.wait_for:
    port: "{{ outline_api_port }}"
    timeout: 60

- name: List existing access keys
  ansible.builtin.uri:
    url: "{{ outline_api_url }}/access-keys"
    method: GET
    validate_certs: false
  register: outline_keys_list

- name: Build map of existing key names
  ansible.builtin.set_fact:
    outline_existing_names: "{{ outline_keys_list.json.accessKeys | map(attribute='name') | list }}"

- name: Delete keys not in the list
  ansible.builtin.uri:
    url: "{{ outline_api_url }}/access-keys/{{ item.id }}"
    method: DELETE
    validate_certs: false
    status_code: [200, 204]
  loop: "{{ outline_keys_list.json.accessKeys }}"
  loop_control:
    label: "{{ item.name | default('Key ' + item.id | string) }}"
  when: item.name | default('') not in outline_key_names

- name: Create missing access keys
  ansible.builtin.uri:
    url: "{{ outline_api_url }}/access-keys"
    method: POST
    validate_certs: false
    status_code: [200, 201]
  register: outline_created_keys
  loop: "{{ outline_key_names }}"
  when: item not in outline_existing_names

- name: Name newly created access keys
  ansible.builtin.uri:
    url: "{{ outline_api_url }}/access-keys/{{ item.json.id }}/name"
    method: PUT
    validate_certs: false
    body_format: json
    body:
      name: "{{ item.item }}"
    status_code: [200, 204]
  loop: "{{ outline_created_keys.results }}"
  when: item is not skipped

- name: Refresh access keys list
  ansible.builtin.uri:
    url: "{{ outline_api_url }}/access-keys"
    method: GET
    validate_certs: false
  register: outline_keys_final

- name: Display Outline access keys
  ansible.builtin.debug:
    msg: "{{ item.name | default('Key ' + item.id | string) }}: created"
  loop: "{{ outline_keys_final.json.accessKeys }}"
  loop_control:
    label: "{{ item.name | default('Key ' + item.id | string) }}"

- name: Generate funny server name
  ansible.builtin.set_fact:
    outline_funny_name: >-
      {%- set adjectives = ['angry', 'brave', 'calm', 'dizzy', 'eager', 'fancy', 'goofy', 'happy', 'icy', 'jolly',
                            'keen', 'lazy', 'moody', 'noble', 'odd', 'proud', 'quiet', 'rusty', 'silly', 'tiny',
                            'witty', 'zany', 'bold', 'crispy', 'fluffy', 'grumpy', 'hasty', 'jumpy', 'lucky', 'sneaky'] -%}
      {%- set nouns = ['badger', 'cactus', 'donkey', 'falcon', 'gopher', 'hamster', 'iguana', 'jackal', 'koala', 'llama',
                       'moose', 'narwhal', 'otter', 'panda', 'quokka', 'raccoon', 'sloth', 'toucan', 'walrus', 'yak',
                       'alpaca', 'bison', 'dingo', 'ferret', 'gibbon', 'heron', 'impala', 'jaguar', 'lemur', 'marmot'] -%}
      {%- set seed = (ansible_host | hash('md5'))[:8] | int(base=16) -%}
      {{ adjectives[seed % (adjectives | length)] }}-{{ nouns[(seed // 31) % (nouns | length)] }}

- name: Save Outline credentials to local file
  ansible.builtin.copy:
    content: |
      # Outline VPN Credentials
      # Name: {{ outline_funny_name }}
      # Generated: {{ ansible_facts['date_time']['iso8601'] }}
      # Server: {{ ansible_host }}
      # API Port: {{ outline_api_port }}
      # Access Port: {{ outline_access_port }}

      Access Keys (share with Outline client app):
      {% for key in outline_keys_final.json.accessKeys %}
      {{ key.name | default('Key ' + key.id | string) }}: {{ key.accessUrl }}
      {% endfor %}

      Management JSON (use in Outline Manager app):
      {"apiUrl":"{{ outline_api_url }}","certSha256":"{{ outline_cert_sha256 }}"}
    dest: "{{ credentials_output_dir }}/{{ service_label }}_credentials.txt"
    mode: '0600'
  delegate_to: 127.0.0.1
  connection: local
  become: false
